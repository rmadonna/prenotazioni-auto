<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trasferte</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0073aa">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Trasferte">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0073aa;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .titolo {
      color: white;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .sottotitolo {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-bottom: 40px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <img class="logo" src="icons/icon-192.png" alt="Logo">
  <div class="titolo">Trasferte</div>
  <div class="sottotitolo">Caricamento in corso...</div>
  <div class="spinner"></div>

  <script>
    // Registra il Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Sostituisci con il tuo URL Apps Script
    const APP_URL = "https://script.google.com/macros/s/AKfycbzeoshQcqnVvMplVX7HU8dMQRtFPcyibguUm_RxjqSj/exec?page=trasferta";

    // Redirect automatico dopo 1.5 secondi
    setTimeout(() => {
      window.location.href = APP_URL;
    }, 1500);
  </script>
</body>
</html>
